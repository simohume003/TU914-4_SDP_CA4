<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loops and Looms </title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }

        header {
            background-color: #222;
            color: white;
            text-align: center;
            padding: 20px;
        }

        .top-bar {
            background-color: #ddd;
            padding: 15px;
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .top-bar input[type="text"] {
            padding: 8px;
            width: 250px;
        }

        .top-bar button {
            padding: 8px 14px;
            cursor: pointer;
        }

        .main-content {
            padding: 30px;
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
        }

        .product-card {
            background-color: white;
            border: 1px solid #ccc;
            padding: 15px;
            text-align: center;
            border-radius: 8px;
        }

        .product-image {
            width: 100%;
            height: 150px;
            background-color: #e0e0e0;
            line-height: 150px;
            margin-bottom: 10px;
            border-radius: 5px;
        }

        .product-card h3 {
            margin: 10px 0 5px;
        }

        .product-card p {
            margin: 5px 0;
        }

        .product-card button {
            margin-top: 10px;
            padding: 8px 12px;
            cursor: pointer;
        }

        @media (max-width: 900px) {
            .product-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 500px) {
            .product-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>Loops and Looms</h1>
        <p>Fashion ""compiled" perfectly</p>
    </header>

    <div class="top-bar">
        <input type="text" placeholder="Search for clothes...">
        <button>Customer Login</button>
        <button>Admin Login</button>
        <button>Shopping Cart</button>
    </div>

    <div class="main-content">
        <h2>Shop Items</h2>

        <div class="product-grid">
            <div class="product-card">
                <div class="product-image">Image</div>
                <h3>T-Shirt</h3>
                <p>€20</p>
                <button>Add to Cart</button>
            </div>

            <div class="product-card">
                <div class="product-image">Image</div>
                <h3>Hoodie</h3>
                <p>€35</p>
                <button>Add to Cart</button>
            </div>

            <div class="product-card">
                <div class="product-image">Image</div>
                <h3>Jeans</h3>
                <p>€40</p>
                <button>Add to Cart</button>
            </div>

            <div class="product-card">
                <div class="product-image">Image</div>
                <h3>Jacket</h3>
                <p>€55</p>
                <button>Add to Cart</button>
            </div>

            <div class="product-card">
                <div class="product-image">Image</div>
                <h3>Sweater</h3>
                <p>€30</p>
                <button>Add to Cart</button>
            </div>

            <div class="product-card">
                <div class="product-image">Image</div>
                <h3>Tracksuit</h3>
                <p>€45</p>
                <button>Add to Cart</button>
            </div>

            <div class="product-card">
                <div class="product-image">Image</div>
                <h3>Cap</h3>
                <p>€15</p>
                <button>Add to Cart</button>
            </div>

            <div class="product-card">
                <div class="product-image">Image</div>
                <h3>Shorts</h3>
                <p>€25</p>
                <button>Add to Cart</button>
            </div>
        </div>
    </div>

</body>
</html>
